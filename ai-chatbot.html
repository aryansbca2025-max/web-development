<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS AI Demo</title>

<style>
body{
font-family: Arial;
margin:0;
scroll-behavior:smooth;
background:white;
color:black;
}

.dark{
background:black;
color:white;
}

nav{
background:rgb(212, 189, 189);
padding:15px;
display:flex;
justify-content:space-between;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

section{
padding:60px;
}

button{
padding:10px 15px;
cursor:pointer;
}

form{
max-width:300px;
display:flex;
flex-direction:column;
gap:10px;
}

input{
padding:8px;
}

.error{
color:red;
font-size:14px;
}

/* 🤖 Chatbot UI */
.chatbox{
position:fixed;
bottom:20px;
right:20px;
width:250px;
background:#eee;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.chat-header{
background:#333;
color:white;
padding:10px;
text-align:center;
}

.chat-body{
height:200px;
overflow-y:auto;
padding:10px;
font-size:14px;
}

.chat-input{
display:flex;
}

.chat-input input{
flex:1;
border:none;
padding:10px;
}

.chat-input button{
border:none;
background:#333;
color:white;
padding:10px;
}
</style>
</head>

<body>

<nav>
<div>
<a href="#home">Home</a>
<a href="#contact">Contact</a>
</div>
<button id="toggleBtn">Dark Mode</button>
</nav>

<section id="home">
<h2>Home Section</h2>
<p>This section shows smooth scrolling.</p>
</section>

<section id="contact">
<h2>Contact Form</h2>

<form id="myForm">

<input type="text" id="name" placeholder="Enter Name">
<span class="error" id="nameError"></span>

<input type="email" id="email" placeholder="Enter Email">
<span class="error" id="emailError"></span>

<button type="submit">Submit</button>

</form>

</section>

<!-- 🤖 Chatbot -->
<div class="chatbox">
<div class="chat-header">AI Chatbot 🤖</div>
<div class="chat-body" id="chatBody"></div>
<div class="chat-input">
<input type="text" id="chatInput" placeholder="Ask something...">
<button onclick="sendMessage()">Send</button>
</div>
</div>

<script>

// Dark Mode
document.getElementById("toggleBtn").onclick = () => {
document.body.classList.toggle("dark")
}


// Form Validation
const form = document.getElementById("myForm")

form.addEventListener("submit", (e)=>{
e.preventDefault()

let name = document.getElementById("name").value.trim()
let email = document.getElementById("email").value.trim()

document.getElementById("nameError").textContent=""
document.getElementById("emailError").textContent=""

let valid = true

if(!name){
document.getElementById("nameError").textContent="Name required"
valid=false
}

if(!email){
document.getElementById("emailError").textContent="Email required"
valid=false
}

if(valid){
alert("Form Submitted 🚀")
form.reset()
}

})


// 🤖 Simple AI Chatbot Logic
function sendMessage(){

let input = document.getElementById("chatInput")
let message = input.value.toLowerCase()
let chatBody = document.getElementById("chatBody")

if(message === "") return

chatBody.innerHTML += `<p><b>You:</b> ${message}</p>`

let reply = "I don't understand 😅"

if(message.includes("hello")) reply = "Hello 👋"
else if(message.includes("name")) reply = "My name is AI Bot 🤖"
else if(message.includes("help")) reply = "I can help you with basic questions!"
else if(message.includes("dark")) reply = "Click Dark Mode button 🌙"

chatBody.innerHTML += `<p><b>Bot:</b> ${reply}</p>`

input.value=""
chatBody.scrollTop = chatBody.scrollHeight

}

</script>

</body>
</html>
